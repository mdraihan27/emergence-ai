<!doctype html>
<html lang="bn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f2eae0;
        color: #3e335a;
        font-family: Roboto, sans-serif;
      }
      .card {
        background: white;
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 10px 30px -15px rgba(60, 40, 90, 0.35);
        max-width: 420px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>আপনি অফলাইনে আছেন</h1>
      <p>ইন্টারনেট সংযোগ ফিরে এলে আবার চেষ্টা করুন।</p>
    </div>
  </body>
</html>
